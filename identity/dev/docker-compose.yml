# Local DEVELOPMENT Keycloak for building/testing the OIDC contract.
# NOT production — see docs/keycloak-setup-and-hardening.md for the prod stand-up.
#   - uses start-dev (no TLS, in-memory-ish caching) — fine locally, never in prod
#   - default creds are throwaway; the real service uses secrets + admin lockdown (§2)
#
# Usage:  docker compose -f identity/dev/docker-compose.yml up
#         Admin console: http://localhost:8080  (admin / admin)
#         Pin the image tag to the version you'll run in prod so config matches.

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: dev-only-password
    volumes:
      - kc-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    # Pin to a specific stable tag; bump deliberately. (Env var names below are for 26.x —
    # older lines use KEYCLOAK_ADMIN / KEYCLOAK_ADMIN_PASSWORD instead.)
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm --health-enabled=true
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: dev-only-password
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      # Drop an exported realm here (identity/dev/realm/bas-realm.json) to auto-import it.
      - ./realm:/opt/keycloak/data/import:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  kc-pgdata:
